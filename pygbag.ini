[atreload]
; After the app has loaded, auto-reload python sources from the app folder.
; default : 0
; Values: 0  / 1
RELOAD=0

[screen]
; Set the canvas/screen size for the application.
; These are set from pygame.display.set_mode in the game code,
; but pygbag uses fb_width/fb_height for the HTML canvas element.
; For a 288x512 portrait game, we use the native ratio.
WIDTH=288
HEIGHT=512